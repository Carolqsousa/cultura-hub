name: Cancellations XLS → BigQuery

on:
  schedule:
    - cron: '0 11 * * 1-6'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

  

      - name: Run pipeline
        env:
          GCP_CREDENTIALS_JSON:          ${{ secrets.GCP_CREDENTIALS_JSON }}
          GCP_PROJECT_ID:                ${{ secrets.GCP_PROJECT_ID }}
          DRIVE_CANCELLATIONS_FOLDER_ID: ${{ secrets.DRIVE_CANCELLATIONS_FOLDER_ID }}
        run: |
          python pipeline/sponte/cancellations_xls.py
