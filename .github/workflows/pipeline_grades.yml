name: Pipeline — Grades

# Roda Seg/Qua/Sex às 7h BRT (10h UTC)
# Mesmo horário que students — notas e alunos ficam sincronizados
#
# Por que não diário?
# Notas são atualizadas com menos frequência que diários ou financeiros.
# Seg/Qua/Sex é suficiente para dashboards de gestão.
#
# Para rodar manualmente: Actions → Pipeline — Grades → Run workflow

on:
  schedule:
    - cron: "0 10 * * 1,3,5"
  workflow_dispatch:

jobs:
  grades:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Proteção: se travar, cancela após 30 min

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run grades pipeline
        env:
          SPONTE_API_KEY_BOA_VIAGEM: ${{ secrets.SPONTE_API_KEY_BOA_VIAGEM }}
          SPONTE_API_KEY_YOUNG:      ${{ secrets.SPONTE_API_KEY_YOUNG }}
          SPONTE_API_KEY_SETUBAL:    ${{ secrets.SPONTE_API_KEY_SETUBAL }}
          SPONTE_API_KEY_NATAL:      ${{ secrets.SPONTE_API_KEY_NATAL }}
          GCP_CREDENTIALS_JSON:      ${{ secrets.GCP_CREDENTIALS_JSON }}
          GCP_PROJECT_ID:            ${{ vars.GCP_PROJECT_ID }}
          SPONTE_SEMESTER:           ${{ vars.SPONTE_SEMESTER }}
        run: python pipeline/run_grades.py
