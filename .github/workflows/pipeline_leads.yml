name: Pipeline — Leads

on:
  schedule:
    - cron: "0 9 * * 1-6"    # 6am BRT Mon-Sat
    - cron: "0 15 * * 1-6"   # 12pm BRT Mon-Sat
    - cron: "0 17 * * 1-6"   # 2pm BRT Mon-Sat
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r pipeline/requirements.txt
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}
      - name: Run leads pipeline
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          BQ_DATASET: cultura_hub
          RD_STATION_API_KEY: ${{ secrets.RD_STATION_API_KEY }}
        run: |
          cd pipeline
          python -c "
import logging
from bigquery.client import ensure_table, upsert_rows
from rd_station_client import RDStationClient
from rd_station.leads import fetch as fetch_leads

logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s %(message)s')
log = logging.getLogger(__name__)

rd = RDStationClient()
try:
    ensure_table('leads')
    rows = fetch_leads(rd)
    upsert_rows('leads', rows)
    log.info(f'leads: {len(rows)} rows written')
except Exception:
    log.exception('leads FAILED')
"
