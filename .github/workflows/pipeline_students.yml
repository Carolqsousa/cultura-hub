name: Pipeline — Students

on:
  schedule:
    - cron: "0 8 * * 1,3,5"   # 5am BRT Mon/Wed/Fri
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r pipeline/requirements.txt
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}
      - name: Run students pipeline
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          BQ_DATASET: cultura_hub
          SPONTE_API_KEY_BOA_VIAGEM: ${{ secrets.SPONTE_API_KEY_BOA_VIAGEM }}
          SPONTE_API_KEY_YOUNG: ${{ secrets.SPONTE_API_KEY_YOUNG }}
          SPONTE_API_KEY_SETUBAL: ${{ secrets.SPONTE_API_KEY_SETUBAL }}
          SPONTE_API_KEY_NATAL: ${{ secrets.SPONTE_API_KEY_NATAL }}
          SPONTE_SEMESTER: ${{ vars.SPONTE_SEMESTER }}
          SPONTE_START: ${{ vars.SPONTE_START }}
          SPONTE_END: ${{ vars.SPONTE_END }}
        run: |
          cd pipeline
          python -c "
import logging
from bigquery.client import ensure_table, upsert_rows
from sponte_client import SponteClient
from sponte.students import fetch as fetch_students
import os

logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s %(message)s')
log = logging.getLogger(__name__)

branches = [
    {'name': 'Boa Viagem', 'api_key': os.environ.get('SPONTE_API_KEY_BOA_VIAGEM', '')},
    {'name': 'Young',      'api_key': os.environ.get('SPONTE_API_KEY_YOUNG', '')},
    {'name': 'Setubal',    'api_key': os.environ.get('SPONTE_API_KEY_SETUBAL', '')},
    {'name': 'Natal',      'api_key': os.environ.get('SPONTE_API_KEY_NATAL', '')},
]

for branch in branches:
    if not branch['api_key']:
        continue
    log.info(f'=== {branch[\"name\"]} ===')
    os.environ['SPONTE_BRANCH_CURRENT'] = branch['name']
    sponte = SponteClient(api_key=branch['api_key'], branch_name=branch['name'])
    try:
        ensure_table('students')
        rows = fetch_students(sponte)
        upsert_rows('students', rows)
        log.info(f'students: {len(rows)} rows written')
    except Exception:
        log.exception(f'students FAILED for {branch[\"name\"]}')
"
