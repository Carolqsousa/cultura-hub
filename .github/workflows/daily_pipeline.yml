name: Daily Pipeline

on:
  schedule:
    - cron: "0 10 * * *"   # 7am BRT = 10am UTC
  workflow_dispatch:        # allow manual runs

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Run pipeline
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          BQ_DATASET: cultura_hub
          SPONTE_API_KEY_BOA_VIAGEM: ${{ secrets.SPONTE_API_KEY_BOA_VIAGEM }}
          SPONTE_API_KEY_YOUNG: ${{ secrets.SPONTE_API_KEY_YOUNG }}
          SPONTE_API_KEY_SETUBAL: ${{ secrets.SPONTE_API_KEY_SETUBAL }}
          SPONTE_API_KEY_NATAL: ${{ secrets.SPONTE_API_KEY_NATAL }}
          SPONTE_SEMESTER: ${{ vars.SPONTE_SEMESTER }}
          SPONTE_START: ${{ vars.SPONTE_START }}
          SPONTE_END: ${{ vars.SPONTE_END }}
          RD_STATION_API_KEY: ${{ secrets.RD_STATION_API_KEY }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
        run: |
          cd pipeline
          python main.py
